services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - staging_minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9003}:9001"
    healthcheck:
      test: [ "CMD-SHELL", "mc ready local || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: greenmind-backend-staging:latest
    restart: always
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: greenmind-exports
      S3_PROVIDER: minio
      FIRMWARE_STORAGE_DIR: /app/firmware_data
      GATEWAY_RELEASE_DIR: /app/firmware_data/gateway_releases
      # Resend / Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@green-mind.ch}
      FRONTEND_URL: ${FRONTEND_URL:-https://test.green-mind.ch}
      CONTACT_FORM_TO: ${CONTACT_FORM_TO:-}
      # ASPSMS
      ASPSMS_USERKEY: ${ASPSMS_USERKEY:-}
      ASPSMS_PASSWORD: ${ASPSMS_PASSWORD:-}
      ASPSMS_SENDER_ID: ${ASPSMS_SENDER_ID:-GreenMind}
      # Gunicorn/Uvicorn settings
      API_PORT: 8000
      GUNICORN_WORKERS: 2
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8001}:8000"
    volumes:
      - staging_firmware_data:/app/firmware_data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: greenmind-frontend-staging:latest
    restart: always
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  staging_postgres_data:
  staging_minio_data:
  staging_firmware_data:
