# ─────────────────────────────────────────────────────────
# Nginx — Staging: test.green-mind.ch
# Install: sudo cp nginx/test.green-mind.ch.conf /etc/nginx/sites-available/greenmind-staging
#          sudo ln -sf /etc/nginx/sites-available/greenmind-staging /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d test.green-mind.ch
#          sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name test.green-mind.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Staging
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.green-mind.ch;

    # TLS (managed by Certbot — run certbot after DNS is configured)
    ssl_certificate /etc/letsencrypt/live/test.green-mind.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.green-mind.ch/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Limits
    client_max_body_size 25m;

    # Prevent search engine indexing of staging
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Logs (separate from production)
    access_log /var/log/nginx/greenmind_staging_access.log;
    error_log  /var/log/nginx/greenmind_staging_error.log;

    # API → Backend directly (bypass Next.js to preserve Set-Cookie headers)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        # WebSocket support (required for /api/v1/ws/*)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Allow long-running exports (sensor data ZIP) and WebSocket idle
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }

    # Frontend (Next.js on staging port)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
