server {
    listen 80;
    listen [::]:80;
    server_name firmware.green-mind.ch;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name firmware.green-mind.ch;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/firmware.green-mind.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/firmware.green-mind.ch/privkey.pem;
    
    # SSL Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Rate Limiting Zones (defined in nginx.conf, assumed here)
    # limit_req zone=firmware_api burst=10 nodelay;

    access_log /var/log/nginx/firmware_access.log;
    error_log /var/log/nginx/firmware_error.log;

    # Static Firmware Downloads 
    # Points to the Docker volume mount point on the host system
    # Make sure this path exists on Hetzner and the Backend Docker container has it mounted to /app/firmware_data
    location /firmware/ {
        alias /var/www/greenmind_firmware_data/;
        autoindex off;
        
        # Optional: Add Cache-Control headers for firmware files
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API Proxy to FastAPI Backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websocket support if needed later
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional UI or redirect
    location / {
        # Currently redirecting to main site or could serve an admin UI static site
        return 302 https://green-mind.ch/admin/firmware;
    }
}
