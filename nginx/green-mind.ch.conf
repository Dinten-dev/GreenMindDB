# ─────────────────────────────────────────────────────────
# Nginx — Production: green-mind.ch
# Install: sudo cp nginx/green-mind.ch.conf /etc/nginx/sites-available/greenmind
#          sudo ln -sf /etc/nginx/sites-available/greenmind /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d green-mind.ch -d www.green-mind.ch
#          sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name green-mind.ch www.green-mind.ch greenmind.biolingo.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Production
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name green-mind.ch www.green-mind.ch greenmind.biolingo.org;

    # TLS (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/greenmind.biolingo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greenmind.biolingo.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security
    server_tokens off;

    # Limits
    client_max_body_size 25m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Logs
    access_log /var/log/nginx/greenmind_prod_access.log;
    error_log  /var/log/nginx/greenmind_prod_error.log;

    # Firmware binary downloads → Backend StaticFiles mount
    location /firmware/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Firmware binaries can be large, allow enough time
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # API → Backend directly (bypass Next.js to preserve Set-Cookie headers)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        # WebSocket support (required for /api/v1/ws/*)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Allow long-running exports (sensor data ZIP) and WebSocket idle
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
