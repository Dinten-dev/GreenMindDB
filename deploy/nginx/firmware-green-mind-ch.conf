# ─────────────────────────────────────────────────────────
# Nginx — firmware.green-mind.ch (OTA Agent Endpoint)
# Proxy to the same FastAPI backend as green-mind.ch
# ─────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name firmware.green-mind.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — OTA Agent Proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name firmware.green-mind.ch;

    # TLS — will be filled by certbot
    ssl_certificate /etc/letsencrypt/live/greenmind.biolingo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greenmind.biolingo.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/firmware_greenmind_access.log;
    error_log  /var/log/nginx/firmware_greenmind_error.log;

    # All requests → FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        # Agent downloads tarballs — allow enough time
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }
}
