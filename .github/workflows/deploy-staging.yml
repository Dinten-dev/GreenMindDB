name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Wait for CI to pass before deploying
    # (Assuming the ci.yml workflow runs on pull requests and pushes)
    # We don't 'need' it strictly here if it runs in parallel, but it's 
    # safer to ensure tests pass. Since ci.yml is a separate workflow, 
    # we can use the workflow_run event or just run CI steps here. 
    # For simplicity, we just trigger deploy on push if you have branch protection.
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
      - name: Deploy to Staging
        run: ./scripts/deploy.sh --env staging
        env:
          DEPLOY_SSH_KEY_FILE: /tmp/ssh_key
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
