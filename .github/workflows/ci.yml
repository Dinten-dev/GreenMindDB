name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend: lint + test
  # ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pytest pytest-mock

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Check formatting with black
        run: python -m black --check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x
        env:
          SKIP_DOCKER_TESTS: "1"
          JWT_SECRET_KEY: "ci-test-secret-key-that-is-at-least-32-chars"

  # ──────────────────────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────
  # Docker: validate compose builds (optional, on main only)
  # ──────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: ci_db
          JWT_SECRET_KEY: "ci-docker-secret-key-min-32-chars-long"
